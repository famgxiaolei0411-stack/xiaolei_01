[pytest]
testpaths = tests
addopts = --basetemp=.pytest_runtime
cache_dir = .pytest_runtime/cache
norecursedirs =
    generated_tests
    outputs
    uploads
    allure-report
    allure-results
    .git
    .pytest_cache
    .pytest_tmp
    .pytest_runtime
asyncio_default_fixture_loop_scope = function
markers =
    integration: integration tests that call real external services
