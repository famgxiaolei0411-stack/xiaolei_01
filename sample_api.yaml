openapi: 3.0.3
info:
  title: AI Test Copilot Sample API
  version: 1.0.0
paths:
  /api/login:
    post:
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [mobile, password]
              properties:
                mobile:
                  type: string
                  example: "13800138000"
                password:
                  type: string
                  example: "Password123"
      responses:
        "200":
          description: 登录成功
        "401":
          description: 账号或密码错误
  /api/orders:
    get:
      summary: 查询订单列表
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, completed, cancelled]
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: end_time
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: 查询成功
        "403":
          description: 无权查看订单
  /api/refunds:
    post:
      summary: 创建退款申请
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, amount, reason]
              properties:
                order_id:
                  type: string
                amount:
                  type: number
                reason:
                  type: string
      responses:
        "201":
          description: 退款申请创建成功
        "400":
          description: 订单状态或金额不允许退款
